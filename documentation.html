<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SVG Components</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --accent: #E85D04;
      --accent-dim: #FDE8D8;
      --accent-dark: #B34400;
      --surface: #FFFFFF;
      --surface-alt: #F7F7F7;
      --surface-code: #F0F0F0;
      --border: #E0E0E0;
      --text: #111111;
      --text-muted: #666666;
      --text-inverse: #FFFFFF;
      --header-bg: #111111;
      --card-radius: 4px;
      --drawer-width: 400px;
      --header-h: 56px;
    }

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 14px;
      line-height: 1.5;
      color: var(--text);
      background: var(--surface-alt);
      min-height: 100vh;
    }

    .header {
      position: sticky;
      top: 0;
      z-index: 100;
      height: var(--header-h);
      background: var(--header-bg);
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 0 24px;
      border-bottom: 2px solid var(--accent);
    }

    .header-title {
      font-size: 15px;
      font-weight: 700;
      color: var(--text-inverse);
      letter-spacing: 0.04em;
      text-transform: uppercase;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .header-title span {
      color: var(--accent);
    }

    .header-controls {
      display: flex;
      align-items: center;
      gap: 10px;
      flex: 1;
      min-width: 0;
    }

    .search-input {
      flex: 1;
      min-width: 0;
      max-width: 320px;
      height: 34px;
      padding: 0 12px;
      font-family: inherit;
      font-size: 13px;
      background: #222;
      color: var(--text-inverse);
      border: 1px solid #444;
      border-radius: var(--card-radius);
      outline: none;
      transition: border-color 0.15s;
    }

    .search-input::placeholder {
      color: #888;
    }

    .search-input:focus,
    .category-select:focus {
      border-color: var(--accent);
    }

    .category-select {
      height: 34px;
      padding: 0 10px;
      font-family: inherit;
      font-size: 13px;
      background: #222;
      color: var(--text-inverse);
      border: 1px solid #444;
      border-radius: var(--card-radius);
      outline: none;
      cursor: pointer;
      transition: border-color 0.15s;
    }

    .header-stats {
      margin-left: auto;
      font-size: 12px;
      color: #888;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .layout {
      display: flex;
      min-height: calc(100vh - var(--header-h));
    }

    .main {
      flex: 1;
      min-width: 0;
      padding: 24px;
      transition: margin-right 0.25s ease;
    }

    .main.drawer-open {
      margin-right: var(--drawer-width);
    }

    .section-heading {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 14px;
      padding-bottom: 6px;
      border-bottom: 1px solid var(--border);
    }

    .card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 12px;
      margin-bottom: 40px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--card-radius);
      cursor: pointer;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    .card:hover {
      border-color: var(--accent);
      box-shadow: 0 0 0 2px var(--accent-dim);
    }

    .card.active {
      border-color: var(--accent);
      border-left-width: 4px;
      box-shadow: 0 0 0 2px var(--accent-dim);
    }

    .card-preview {
      height: 110px;
      background: var(--surface-alt);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      padding: 8px;
    }

    .card-preview svg {
      max-width: 100%;
      max-height: 100%;
      width: auto;
      height: auto;
    }

    .card-preview-empty {
      font-size: 11px;
      color: var(--text-muted);
      font-family: 'JetBrains Mono', monospace;
    }

    .card-body {
      padding: 10px 12px 12px;
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .card-name {
      font-size: 13px;
      font-weight: 600;
      font-family: 'JetBrains Mono', monospace;
      color: var(--text);
    }

    .card-long-name {
      font-size: 11px;
      color: var(--text-muted);
    }

    .card-chips,
    .aliases-list,
    .guide-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
    }

    .chip {
      display: inline-block;
      font-size: 10px;
      font-family: 'JetBrains Mono', monospace;
      padding: 1px 6px;
      border-radius: 2px;
      background: var(--accent-dim);
      color: var(--accent-dark);
      font-weight: 500;
    }

    .chip.category,
    .chip.meta {
      background: var(--surface-code);
      color: var(--text-muted);
    }

    .drawer {
      position: fixed;
      top: var(--header-h);
      right: 0;
      bottom: 0;
      width: var(--drawer-width);
      background: var(--surface);
      border-left: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      transform: translateX(100%);
      transition: transform 0.25s ease;
      z-index: 90;
      overflow: hidden;
    }

    .drawer.open {
      transform: translateX(0);
    }

    .drawer-header {
      padding: 16px 20px 14px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: flex-start;
      gap: 12px;
      flex-shrink: 0;
    }

    .drawer-header-text {
      flex: 1;
      min-width: 0;
    }

    .drawer-title {
      font-size: 16px;
      font-weight: 700;
      font-family: 'JetBrains Mono', monospace;
      color: var(--text);
    }

    .drawer-subtitle {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 2px;
    }

    .drawer-close {
      flex-shrink: 0;
      width: 28px;
      height: 28px;
      border: 1px solid var(--border);
      border-radius: var(--card-radius);
      background: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      color: var(--text-muted);
      transition: border-color 0.15s, color 0.15s;
    }

    .drawer-close:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .drawer-body {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .drawer-preview {
      background: var(--surface-alt);
      border: 1px solid var(--border);
      border-radius: var(--card-radius);
      padding: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 140px;
    }

    .drawer-preview svg {
      max-width: 100%;
      max-height: 200px;
      width: auto;
      height: auto;
    }

    .drawer-section-label,
    details > summary {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .drawer-section-label {
      color: var(--text-muted);
      margin-bottom: 8px;
    }

    .drawer-description,
    .guide-copy {
      font-size: 13px;
      color: var(--text);
      line-height: 1.6;
    }

    .var-table,
    .parts-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
    }

    .var-table th,
    .parts-table th {
      text-align: left;
      padding: 6px 8px;
      background: var(--surface-alt);
      border-bottom: 2px solid var(--border);
      font-weight: 600;
      color: var(--text-muted);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .var-table td,
    .parts-table td {
      padding: 8px 10px;
      border-bottom: 1px solid var(--border);
      vertical-align: top;
    }

    .var-table tr:last-child td,
    .parts-table tr:last-child td {
      border-bottom: none;
    }

    .parts-table td {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
    }

    .parts-table tr:hover td {
      background: var(--surface-alt);
    }

    .parts-table tr.part-detail-row:hover td {
      background: var(--surface);
    }

    .part-detail-cell {
      padding: 0;
    }

    .part-detail {
      padding: 14px 16px 16px;
      background: linear-gradient(180deg, #FFFFFF 0%, #FAFAFA 100%);
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .part-detail-copy {
      font-size: 12px;
      color: var(--text-muted);
      line-height: 1.6;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    .part-option-list {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 10px;
    }

    .part-option-card {
      border: 1px solid var(--border);
      border-radius: var(--card-radius);
      background: var(--surface);
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .part-option-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .part-option-name {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      font-weight: 600;
      color: var(--accent-dark);
    }

    .part-option-type {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      color: var(--text-muted);
      background: var(--surface-code);
      padding: 1px 5px;
      border-radius: 2px;
    }

    .part-option-description {
      font-size: 12px;
      line-height: 1.6;
      color: var(--text-muted);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    .part-option-current {
      font-size: 11px;
      line-height: 1.6;
      color: var(--text);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    .part-option-current code {
      font-family: 'JetBrains Mono', monospace;
      background: var(--surface-code);
      padding: 1px 4px;
      border-radius: 2px;
    }

    .var-name,
    .var-type,
    .var-default {
      font-family: 'JetBrains Mono', monospace;
      white-space: nowrap;
    }

    .var-name {
      font-weight: 500;
      color: var(--accent-dark);
    }

    .var-type {
      color: var(--text-muted);
    }

    .var-default {
      background: var(--surface-code);
      padding: 1px 5px;
      border-radius: 2px;
      font-size: 11px;
    }

    .var-table-empty,
    .empty-state {
      color: var(--text-muted);
      font-size: 13px;
    }

    .empty-state {
      padding: 48px 24px;
      text-align: center;
    }

    .empty-state-code {
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      margin-top: 8px;
    }

    .parts-section,
    .stylesheets-section {
      margin-top: 24px;
      border: 1px solid var(--border);
      border-radius: var(--card-radius);
      background: var(--surface);
      overflow: hidden;
    }

    details > summary {
      cursor: pointer;
      list-style: none;
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--text-muted);
      padding: 14px 20px;
      border-bottom: 1px solid var(--border);
      user-select: none;
    }

    details > summary::-webkit-details-marker {
      display: none;
    }

    .summary-arrow {
      font-size: 10px;
      transition: transform 0.15s;
      display: inline-block;
    }

    details[open] > summary .summary-arrow {
      transform: rotate(90deg);
    }

    .parts-table {
      margin: 0;
    }

    .stylesheets-body {
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .stylesheet-guide-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 14px;
    }

    .stylesheet-guide-card {
      border: 1px solid var(--border);
      border-radius: var(--card-radius);
      background: linear-gradient(180deg, #FFFFFF 0%, #FAFAFA 100%);
      overflow: hidden;
    }

    .guide-card-header {
      padding: 16px 16px 0;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .guide-eyebrow {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--accent-dark);
    }

    .guide-title {
      font-size: 16px;
      font-weight: 600;
      color: var(--text);
    }

    .guide-card-body {
      padding: 12px 16px 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .guide-note {
      border-left: 3px solid var(--accent);
      padding-left: 10px;
      color: var(--text-muted);
      font-size: 12px;
      line-height: 1.6;
    }

    .guide-code,
    .stylesheet-usage {
      background: var(--surface-code);
      border: 1px solid var(--border);
      border-radius: var(--card-radius);
      padding: 14px 16px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      line-height: 1.7;
      overflow-x: auto;
      white-space: pre;
    }

    .sheet-tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      padding-bottom: 8px;
      border-bottom: 2px solid var(--border);
    }

    .sheet-tab {
      padding: 8px 16px;
      border: none;
      background: none;
      font: inherit;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-muted);
      cursor: pointer;
      border-bottom: 2px solid transparent;
      margin-bottom: -10px;
      transition: color 0.15s, border-color 0.15s;
    }

    .sheet-tab:hover {
      color: var(--text);
    }

    .sheet-tab.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
    }

    .sheet-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 20px;
      margin-bottom: 8px;
    }

    .sheet-title {
      font-size: 16px;
      font-weight: 600;
      color: var(--text);
    }

    .sheet-source {
      font-size: 11px;
      font-family: 'JetBrains Mono', monospace;
      background: var(--surface-code);
      padding: 2px 6px;
      border-radius: 2px;
      color: var(--text-muted);
      white-space: nowrap;
      flex-shrink: 0;
    }

    .sheet-description {
      font-size: 13px;
      color: var(--text-muted);
      margin-bottom: 20px;
      line-height: 1.6;
      max-width: 640px;
    }

    .swatch-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 10px;
      margin-bottom: 24px;
    }

    .swatch-card {
      border: 1px solid var(--border);
      border-radius: var(--card-radius);
      overflow: hidden;
      font-size: 11px;
      background: var(--surface);
    }

    .swatch-preview {
      height: 48px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      font-weight: 500;
      position: relative;
    }

    .swatch-preview.outline-only {
      background: repeating-linear-gradient(
        45deg,
        #F0F0F0 0px,
        #F0F0F0 4px,
        #FFFFFF 4px,
        #FFFFFF 8px
      );
    }

    .swatch-name {
      padding: 6px 8px 2px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      font-weight: 500;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .swatch-props {
      padding: 2px 8px 6px;
      display: flex;
      flex-direction: column;
      gap: 1px;
    }

    .swatch-prop {
      font-family: 'JetBrains Mono', monospace;
      font-size: 9px;
      color: var(--text-muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .prop-val {
      color: var(--accent);
    }

    .stylesheet-usage-heading {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-muted);
      margin-bottom: 8px;
    }

    .code-comment { color: #888888; }
    .code-fn { color: #E85D04; }
    .code-str { color: #0070CC; }
    .code-kw { color: #9B59B6; }

    @media (max-width: 960px) {
      .main.drawer-open {
        margin-right: 0;
      }

      .drawer {
        width: min(100vw, 420px);
      }

      .header {
        flex-wrap: wrap;
        height: auto;
        min-height: var(--header-h);
        padding: 12px 16px;
      }

      .layout {
        min-height: calc(100vh - 80px);
      }

      .main {
        padding: 18px;
      }
    }

    @media (max-width: 640px) {
      .header-controls {
        width: 100%;
      }

      .search-input {
        max-width: none;
      }

      .sheet-header {
        flex-direction: column;
        gap: 8px;
      }

      .stylesheet-guide-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <header class="header">
    <div class="header-title">SVG <span>Components</span></div>
    <div class="header-controls">
      <input id="search-input" class="search-input" type="search" placeholder="Search components..." autocomplete="off">
      <select id="category-select" class="category-select">
        <option value="">All categories</option>
      </select>
    </div>
    <div class="header-stats" id="header-stats"></div>
  </header>

  <div class="layout">
    <main class="main" id="main">
      <div class="section-heading" id="components-heading">Components</div>
      <div class="card-grid" id="card-grid"></div>

      <div class="parts-section">
        <details id="parts-details">
          <summary>
            <span class="summary-arrow">&#9654;</span>
            Generated Parts Catalogue
          </summary>
          <table class="parts-table" id="parts-table">
            <thead>
              <tr>
                <th>ID</th>
                <th>Builder</th>
                <th>Classification</th>
                <th>Size</th>
              </tr>
            </thead>
            <tbody id="parts-tbody"></tbody>
          </table>
        </details>
      </div>

      <div class="stylesheets-section">
        <details id="stylesheets-details" open>
          <summary>
            <span class="summary-arrow">&#9654;</span>
            Stylesheets
          </summary>
          <div class="stylesheets-body" id="stylesheets-body"></div>
        </details>
      </div>
    </main>

    <aside class="drawer" id="drawer">
      <div class="drawer-header">
        <div class="drawer-header-text">
          <div class="drawer-title" id="drawer-title">Component</div>
          <div class="drawer-subtitle" id="drawer-subtitle"></div>
        </div>
        <button class="drawer-close" id="drawer-close" aria-label="Close detail panel">&#x2715;</button>
      </div>
      <div class="drawer-body" id="drawer-body">
        <div class="empty-state">
          <div>Select a component card to view documentation.</div>
        </div>
      </div>
    </aside>
  </div>

  <script>
window.DOCUMENTATION_DATA = {

      "sample_svg": "<?xml version=\"1.0\" encoding=\"utf-8\"?>\n<svg xmlns=\"http://www.w3.org/2000/svg\"\n     width=\"26.0000mm\" height=\"26.0000mm\"\n     viewBox=\"0 0 26.0000 26.0000\">\n  <circle cx=\"13.0000\" cy=\"13.0000\" r=\"8.0000\"  fill=\"#333333\" stroke=\"none\" />\n</svg>"
    },

  <script>
    function esc(str) {
      return String(str ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    function defaultStr(val) {
      if (val === null || val === undefined || val === '') return '';
      if (typeof val === 'object') return JSON.stringify(val);
      return String(val);
    }

    function buildCard(comp) {
      const preview = comp.sample_svg
        ? `<div class="card-preview">${comp.sample_svg}</div>`
        : `<div class="card-preview"><span class="card-preview-empty">no preview</span></div>`;

      const aliases = (comp.shape_aliases || [])
        .map(a => `<span class="chip">${esc(a)}</span>`).join('');

      return `
        <div class="card" data-name="${esc(comp.name)}"
             data-search="${esc([comp.name, comp.name_long, comp.category, (comp.shape_aliases || []).join(' ')].join(' ').toLowerCase())}">
          ${preview}
          <div class="card-body">
            <div class="card-name">${esc(comp.name)}</div>
            <div class="card-long-name">${esc(comp.name_long)}</div>
            <div class="card-chips">
              <span class="chip category">${esc(comp.category)}</span>
              ${aliases}
            </div>
          </div>
        </div>`;
    }

    function buildDrawerBody(comp) {
      const preview = comp.sample_svg
        ? `<div class="drawer-preview">${comp.sample_svg}</div>`
        : '';

      const aliases = (comp.shape_aliases || []).length
        ? `<div>
             <div class="drawer-section-label">Aliases</div>
             <div class="aliases-list">
               ${comp.shape_aliases.map(a => `<span class="chip">${esc(a)}</span>`).join('')}
             </div>
           </div>`
        : '';

      const vars = comp.variables || [];
      let varTable;
      if (vars.length === 0) {
        varTable = `<div class="drawer-section-label">Variables</div>
                    <p class="var-table-empty">No variables declared.</p>`;
      } else {
        const rows = vars.map(v => `
          <tr>
            <td><span class="var-name">${esc(v.name)}</span></td>
            <td><span class="var-type">${esc(v.type)}</span></td>
            <td><span class="var-default">${esc(defaultStr(v.default))}</span></td>
            <td>${esc(v.description)}</td>
          </tr>`).join('');
        varTable = `
          <div>
            <div class="drawer-section-label">Variables</div>
            <table class="var-table">
              <thead>
                <tr>
                  <th>Name</th><th>Type</th><th>Default</th><th>Description</th>
                </tr>
              </thead>
              <tbody>${rows}</tbody>
            </table>
          </div>`;
      }

      const returns = comp.returns
        ? `<div>
             <div class="drawer-section-label">Returns</div>
             <div class="drawer-description">${esc(comp.returns)}</div>
           </div>`
        : '';

      return `
        ${preview}
        <div>
          <div class="drawer-section-label">Description</div>
          <div class="drawer-description">${esc(comp.description || 'No description.')}</div>
        </div>
        ${aliases}
        ${varTable}
        ${returns}`;
    }

    let activeCard = null;

    function openDrawer(comp, cardEl) {
      document.getElementById('drawer-title').textContent = comp.name;
      document.getElementById('drawer-subtitle').textContent = comp.name_long + ' — ' + comp.category;
      document.getElementById('drawer-body').innerHTML = buildDrawerBody(comp);
      document.getElementById('drawer').classList.add('open');
      document.getElementById('main').classList.add('drawer-open');

      if (activeCard) activeCard.classList.remove('active');
      activeCard = cardEl;
      activeCard.classList.add('active');
    }

    function closeDrawer() {
      document.getElementById('drawer').classList.remove('open');
      document.getElementById('main').classList.remove('drawer-open');
      if (activeCard) {
        activeCard.classList.remove('active');
        activeCard = null;
      }
    }

    function renderCards(components) {
      const grid = document.getElementById('card-grid');
      const heading = document.getElementById('components-heading');
      const stats = document.getElementById('header-stats');
      const search = (document.getElementById('search-input').value || '').trim().toLowerCase();
      const cat = document.getElementById('category-select').value;

      const filtered = components.filter(c => {
        const matchCat = !cat || c.category === cat;
        const haystack = [c.name, c.name_long, c.category, (c.shape_aliases || []).join(' ')].join(' ').toLowerCase();
        const matchText = !search || haystack.includes(search);
        return matchCat && matchText;
      });

      heading.textContent = `Components (${filtered.length})`;
      stats.textContent = `${components.length} total`;

      if (filtered.length === 0) {
        grid.innerHTML = `<div class="empty-state">
          <div>No components match this filter.</div>
          <div class="empty-state-code">${esc(search || cat)}</div>
        </div>`;
        return;
      }

      grid.innerHTML = filtered.map(buildCard).join('');
      grid.querySelectorAll('.card').forEach(cardEl => {
        const name = cardEl.dataset.name;
        const comp = components.find(c => c.name === name);
        cardEl.addEventListener('click', () => openDrawer(comp, cardEl));
      });
    }

    let activeSheetName = null;

    function contrastText(hex) {
      hex = (hex || '#888888').replace('#', '');
      if (hex.length === 3) hex = hex.split('').map(c => c + c).join('');
      const r = parseInt(hex.slice(0, 2), 16);
      const g = parseInt(hex.slice(2, 4), 16);
      const b = parseInt(hex.slice(4, 6), 16);
      const lum = 0.299 * r + 0.587 * g + 0.114 * b;
      return lum > 140 ? '#111111' : '#FFFFFF';
    }

    function buildSwatchCard(style) {
      const color = style.color || '#333333';
      const stroke = style.stroke || 'none';
      const sw = style.stroke_width || 0;
      const isOutlineOnly = color === 'none';
      const isInvisible = color === 'none' && stroke === 'none';

      let previewStyle = '';
      let previewClass = 'swatch-preview';
      let previewLabel = '';

      if (isInvisible) {
        previewStyle = 'background:#f7f7f7;';
        previewLabel = '<span style="color:#ccc;font-size:10px">empty</span>';
      } else if (isOutlineOnly) {
        previewClass += ' outline-only';
        const sw2 = Math.max(sw * 3, 2);
        previewStyle = `border:${sw2}px solid ${stroke};`;
        previewLabel = `<span style="color:${stroke};font-size:9px">${stroke}</span>`;
      } else {
        previewStyle = `background:${color};`;
        if (stroke !== 'none') {
          const sw2 = Math.max(sw * 3, 2);
          previewStyle += `border:${sw2}px solid ${stroke};`;
        }
        previewLabel = `<span style="color:${contrastText(color)};font-size:9px">${color}</span>`;
      }

      const extra = style.extra || {};
      const extraProps = Object.entries(extra).slice(0, 3).map(([k, v]) =>
        `<div class="swatch-prop">${esc(k)}: <span class="prop-val">${esc(String(v))}</span></div>`
      ).join('');

      const strokeProp = stroke !== 'none'
        ? `<div class="swatch-prop">stroke: <span class="prop-val">${esc(stroke)}</span></div>`
        : '';

      return `
        <div class="swatch-card">
          <div class="${previewClass}" style="${previewStyle}">${previewLabel}</div>
          <div class="swatch-name" title="${esc(style.name)}">${esc(style.name)}</div>
          <div class="swatch-props">
            ${isOutlineOnly ? '' : `<div class="swatch-prop">fill: <span class="prop-val">${esc(color)}</span></div>`}
            ${strokeProp}
            ${extraProps}
          </div>
        </div>`;
    }

    function buildUsageBlock(sheetName) {
      const c = s => `<span class="code-comment">${s}</span>`;
      const f = s => `<span class="code-fn">${s}</span>`;
      const st = s => `<span class="code-str">${s}</span>`;
      const kw = s => `<span class="code-kw">${s}</span>`;
      const nl = '\n';

      return [
        c('# Activate in a part builder:'),
        `thing[${st('"styles"')}] = svg_styles.${f('get_stylesheet')}(${st('"' + sheetName + '"')})`,
        '',
        c('# Or set per working.yaml:'),
        c('# svg_details:'),
        c('#   stylesheet: "' + sheetName + '"'),
        '',
        c('# Use named styles. Inline kwargs still win:'),
        `opsvg.${f('se')}(thing, shape=${st('"oobb_plate"')}, ${kw('style')}=${st('"plate"')}, width=2, height=2, pos=pos)`,
        `opsvg.${f('se')}(thing, shape=${st('"text"')}, ${kw('style')}=${st('"header.label"')}, text=${st('"Title"')}, pos=pos)`,
        '',
        c('# Override one style for a project:'),
        c('# svg_details:'),
        c('#   styles:'),
        c('#     plate:'),
        c('#       color: "#FF6600"'),
      ].join(nl);
    }

    function buildGuideCard(eyebrow, title, copy, chips, code, note) {
      const chipHtml = (chips || []).map(chip => `<span class="chip meta">${esc(chip)}</span>`).join('');
      return `
        <section class="stylesheet-guide-card">
          <div class="guide-card-header">
            <div class="guide-eyebrow">${esc(eyebrow)}</div>
            <div class="guide-title">${esc(title)}</div>
            <div class="guide-copy">${esc(copy)}</div>
          </div>
          <div class="guide-card-body">
            <div class="guide-chips">${chipHtml}</div>
            <div class="guide-code">${code}</div>
            <div class="guide-note">${esc(note)}</div>
          </div>
        </section>`;
    }

    function buildStylesheetGuides(firstSheetName) {
      const preferred = firstSheetName || 'default';
      const projectYaml = [
        'svg_details:',
        `  stylesheet: ${preferred}`,
        '  styles:',
        '    plate:',
        '      color: "#FF6600"',
        '    label:',
        '      font: "JetBrains Mono, monospace"',
      ].join('\n');

      const stylesheetFile = [
        '# styles/project_bolt.yaml',
        'plate:',
        '  color: "#E85D04"',
        '  stroke: "#111111"',
        'header.label:',
        '  color: "#FFFFFF"',
        'label.mono:',
        '  font: "JetBrains Mono, monospace"',
      ].join('\n');

      return `
        <div class="stylesheet-guide-grid">
          ${buildGuideCard(
            'Per Project',
            'Define it in working.yaml',
            'Attach a stylesheet to a part directly in svg_details and optionally override a few named styles for that one project.',
            ['svg_details', 'stylesheet', 'styles'],
            projectYaml,
            'Use this when the project needs a custom look without creating a new reusable sheet.'
          )}
          ${buildGuideCard(
            'Reusable',
            'Create a stylesheet file in styles/',
            'Add a YAML file for a named sheet when you want the same visual language available across multiple parts and projects.',
            ['styles/*.yaml', 'auto-discovered', 'shared'],
            stylesheetFile,
            'File-based sheets show up automatically in the documentation and can be referenced from working.yaml by name.'
          )}
        </div>`;
    }

    function renderStylesheets(stylesheets) {
      const body = document.getElementById('stylesheets-body');
      if (!stylesheets || stylesheets.length === 0) {
        body.innerHTML = '<p style="color:var(--text-muted);">No stylesheet data found.</p>';
        return;
      }

      activeSheetName = stylesheets[0].name;
      const tabs = stylesheets.map(s =>
        `<button class="sheet-tab${s.name === activeSheetName ? ' active' : ''}" data-sheet="${esc(s.name)}">${esc(s.label || s.name)}</button>`
      ).join('');

      body.innerHTML = `
        ${buildStylesheetGuides(activeSheetName)}
        <div class="sheet-tabs" id="sheet-tabs">${tabs}</div>
        <div id="sheet-content"></div>`;

      function showSheet(name) {
        activeSheetName = name;
        document.querySelectorAll('.sheet-tab').forEach(btn => {
          btn.classList.toggle('active', btn.dataset.sheet === name);
        });

        const sheet = stylesheets.find(s => s.name === name);
        if (!sheet) return;

        const swatches = (sheet.styles || []).map(buildSwatchCard).join('');
        document.getElementById('sheet-content').innerHTML = `
          <div class="sheet-header">
            <div>
              <div class="sheet-title">${esc(sheet.label || sheet.name)}</div>
            </div>
            <div class="sheet-source">${esc(sheet.source || 'builtin')}</div>
          </div>
          <div class="sheet-description">${esc(sheet.description || 'No description provided.')}</div>
          <div class="swatch-grid">${swatches}</div>
          <div class="stylesheet-usage-heading">Using ${esc(sheet.name)}</div>
          <div class="stylesheet-usage">${buildUsageBlock(sheet.name)}</div>`;
      }

      showSheet(activeSheetName);

      document.getElementById('sheet-tabs').addEventListener('click', event => {
        const btn = event.target.closest('.sheet-tab');
        if (btn) showSheet(btn.dataset.sheet);
      });
    }

    function renderParts(parts) {
      const tbody = document.getElementById('parts-tbody');
      if (!parts || parts.length === 0) {
        tbody.innerHTML = '<tr><td colspan="4" style="color:var(--text-muted);font-style:italic;padding:12px 10px;">No parts found.</td></tr>';
        return;
      }

      function formatCurrentValue(value) {
        if (value === null || value === undefined || value === '') return 'not set';
        if (Array.isArray(value)) return `[${value.join(', ')}]`;
        if (typeof value === 'object') {
          const keys = Object.keys(value);
          return keys.length === 0 ? 'not set' : JSON.stringify(value);
        }
        return String(value);
      }

      tbody.innerHTML = parts.map(p => {
        const options = (p.style_options || []).map(opt => `
          <div class="part-option-card">
            <div class="part-option-head">
              <div class="part-option-name">${esc(opt.name)}</div>
              <div class="part-option-type">${esc(opt.type || '')}</div>
            </div>
            <div class="part-option-description">${esc(opt.description || '')}</div>
            <div class="part-option-current">Current: <code>${esc(formatCurrentValue(opt.current))}</code></div>
          </div>`).join('');

        return `
          <tr>
            <td>${esc(p.id)}</td>
            <td>${esc(p.svg_name || p.oobb_name)}</td>
            <td>${esc(p.classification)}</td>
            <td>${esc(p.size)}</td>
          </tr>
          <tr class="part-detail-row">
            <td class="part-detail-cell" colspan="4">
              <div class="part-detail">
                <div class="part-detail-copy">
                  Every documented part supports the same style controls. Use <code>stylesheet</code> to pick one or more named sheets for the part, then use <code>styles</code> to override individual named entries for that part only.
                </div>
                <div class="part-option-list">${options}</div>
              </div>
            </td>
          </tr>`;
      }).join('');
    }

    function populateCategories(components) {
      const cats = [...new Set(components.map(c => c.category || 'General'))].sort();
      const sel = document.getElementById('category-select');
      cats.forEach(cat => {
        const opt = document.createElement('option');
        opt.value = cat;
        opt.textContent = cat;
        sel.appendChild(opt);
      });
    }

    (function init() {
      if (typeof window.DOCUMENTATION_DATA === 'undefined') {
        document.getElementById('card-grid').innerHTML =
          '<div class="empty-state"><div>No documentation data found.</div><div class="empty-state-code">Run: python svg_documentation.py</div></div>';
        return;
      }

      const data = window.DOCUMENTATION_DATA;
      const components = data.components || [];
      const parts = data.parts || [];
      const stylesheets = data.stylesheets || [];

      populateCategories(components);
      renderCards(components);
      renderParts(parts);
      renderStylesheets(stylesheets);

      document.getElementById('search-input').addEventListener('input', () => renderCards(components));
      document.getElementById('category-select').addEventListener('change', () => renderCards(components));
      document.getElementById('drawer-close').addEventListener('click', closeDrawer);
      document.addEventListener('keydown', event => {
        if (event.key === 'Escape') closeDrawer();
      });
    })();
  </script>
</body>
</html>
